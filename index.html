<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>Permaculture Hex Grid Map Editor v14.9.12 (Plants + Structures + Paths + Water)</title>
  <style>
    :root {
      --bg: #0f1216;
      --panel: #151a21;
      --panel2: #10151c;
      --text: #e7edf5;
      --muted: #a9b4c2;
      --stroke: rgba(255,255,255,.10);
      --stroke2: rgba(255,255,255,.16);
      --accent: #6ee7ff;
      --danger: #ff6e6e;
      --good: #7CFF9A;
      --warn: #ffd36e;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); }
    * { box-sizing: border-box; }

    .app {
      display: grid;
      grid-template-columns: 1fr 380px;
      height: 100%;
      width: 100%;
    }

    .stage {
      position: relative;
      overflow: hidden;
      background: radial-gradient(1200px 800px at 30% 20%, rgba(110,231,255,.07), transparent 55%),
                  radial-gradient(1000px 900px at 70% 70%, rgba(124,255,154,.06), transparent 60%),
                  linear-gradient(180deg, #0e1116, #0b0e12);
      border-right: 1px solid var(--stroke);
      touch-action: none;
    }

    canvas { display: block; width: 100%; height: 100%; }

    .hud {
      position: absolute;
      left: 12px;
      top: 12px;
      display: flex;
      gap: 10px;
      align-items: stretch;
      padding: 10px;
      background: rgba(21,26,33,.85);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      flex-wrap: wrap;
      max-width: calc(100% - 24px);
      user-select: none;
    }

    .group {
      display: flex;
      gap: 8px;
      align-items: center;
      padding-right: 10px;
      border-right: 1px solid var(--stroke);
    }
    .group:last-child { border-right: none; padding-right: 0; }

    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
    input[type="number"], input[type="text"], select, textarea {
      width: 100%;
      border: 1px solid var(--stroke2);
      background: var(--panel2);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      outline: none;
      font-size: 14px;
    }
    textarea { min-height: 76px; resize: vertical; }

    .btn {
      border: 1px solid var(--stroke2);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      color: var(--text);
      border-radius: 12px;
      padding: 8px 10px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 34px;
    }
    .btn:hover { border-color: rgba(110,231,255,.35); }
    .btn:active { transform: translateY(1px); }
    .btn.primary { border-color: rgba(110,231,255,.35); box-shadow: 0 0 0 2px rgba(110,231,255,.12) inset; }
    .btn.danger { border-color: rgba(255,110,110,.35); }
    .btn.good { border-color: rgba(124,255,154,.35); }
    .btn.tiny { padding: 6px 8px; border-radius: 10px; min-height: 30px; font-size: 12px; }

    .chiprow { display:flex; gap:6px; flex-wrap: wrap; }
    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1px solid var(--stroke2);
      display: inline-block;
      flex: 0 0 auto;
    }
    .legendRow {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid var(--stroke);
      border-radius: 12px;
      background: rgba(0,0,0,.20);
    }
    .legendMain {
      display:flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .legendTop {
      display:flex;
      gap: 10px;
      align-items: baseline;
      flex-wrap: wrap;
    }
    .legendKey {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
    }
    .legendName {
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 260px;
    }
    .legendMeta {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .chip {
      font-family: var(--mono);
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--stroke2);
      color: var(--muted);
      background: rgba(0,0,0,.22);
    }

    .panel {
      background: linear-gradient(180deg, rgba(21,26,33,.92), rgba(16,21,28,.92));
      padding: 14px;
      overflow: auto;
    }

    .card {
      background: rgba(10,14,18,.40);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
    }

    .title {
      display:flex; align-items:center; justify-content: space-between; gap: 10px;
      margin-bottom: 10px;
    }
    .title h2 { font-size: 14px; margin: 0; letter-spacing: .2px; }
    .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .row { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row3 { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    .sep { height: 1px; background: var(--stroke); margin: 10px 0; }

    .kvs { display:grid; grid-template-columns: 140px 1fr; gap: 6px 10px; font-size: 13px; }
    .kvs div:nth-child(odd) { color: var(--muted); }
    .mono { font-family: var(--mono); }

    .footnote { font-size: 12px; color: var(--muted); line-height: 1.35; }

    .file {
      display:flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    .file input[type="file"] { color: var(--muted); }

    .kbd { font-family: var(--mono); font-size: 12px; padding: 2px 6px; border-radius: 6px;
      border: 1px solid var(--stroke2); background: rgba(0,0,0,.25); color: var(--muted); }

    .hint { color: var(--muted); font-size: 12px; }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .panel { border-top: 1px solid var(--stroke); }
    }
  
    /* MCP / Inspector */
    .statusDot{width:10px;height:10px;border-radius:999px;display:inline-block;border:1px solid var(--stroke2);}
    .statusDot.ok{background: rgba(124,255,154,.85);}
    .statusDot.bad{background: rgba(255,110,110,.85);}
    .statusDot.mid{background: rgba(255,211,110,.85);}
    .log{
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(0,0,0,.20);
      border: 1px solid var(--stroke);
      border-radius: 12px;
      padding: 10px;
      max-height: 180px;
      overflow: auto;
      color: rgba(231,237,245,.92);
    }
    .smallBtnRow{display:flex; gap:8px; flex-wrap:wrap;}
</style>
</head>
<body>
  <div class="app">
    <div class="stage" id="stage">
      <canvas id="c"></canvas>

      <div class="hud">
        <div class="group">
          <div style="min-width: 170px;">
            <label>Tool</label>
            <select id="tool">
              <option value="plant">Plant paint (by ID)</option>
              <option value="structure">Structure paint (by ID)</option>
              <option value="path">Path paint (by ID)</option>
              <option value="water">Water paint (by ID)</option>
              <option value="movebg">Move background image</option>
              <option value="erase">Erase</option>
              <option value="select">Select</option>
              <option value="multiselect">Multi-select</option>
              <option value="pan">Pan only</option>
            </select>
          </div>
          <div style="width: 120px;">
            <label>Value / ID</label>
            <input id="valueId" type="number" min="0" step="1" value="1" />
          </div>
          <div style="width: 96px;">
            <label>Pos (1–6)</label>
            <input id="slotPos" type="number" min="1" max="6" step="1" value="1" />
          </div>
          <div style="width: 120px; display:flex; gap:10px; align-items:flex-end;">
            <label style="display:flex; align-items:center; gap:8px; margin:0;">
              <input id="slotAuto" type="checkbox" checked />
              <span style="font-size:12px; opacity:.9;">Auto</span>
            </label>
          </div>
          <div style="width: 150px; display:flex; gap:10px; align-items:flex-end;">
            <label style="display:flex; align-items:center; gap:8px; margin:0;">
              <input id="stackPaint" type="checkbox" />
              <span style="font-size:12px; opacity:.9;">Multi-slot</span>
            </label>
          </div>

          <div style="width: 120px;">
            <label>Brush radius</label>
            <input id="brushRadius" type="number" min="0" max="30" step="1" value="0" />
          </div>

          <div style="width: 150px;">
            <label style="margin-bottom:6px;">ID labels</label>
            <label style="display:flex; align-items:center; gap:8px; margin:0;">
              <input id="toggleIds" type="checkbox" checked />
              <span style="font-size:12px; opacity:.9;">Show IDs</span>
            </label>
          </div>
          <div style="width: 120px;">
            <label>Font size</label>
            <input id="idFontSize" type="number" min="6" max="72" step="1" value="13" />
          </div>


        </div>

        <div class="group">
          <div style="width: 120px;">
            <label>Hex size</label>
            <input id="hexSize" type="number" min="8" max="90" step="1" value="28" />
          </div>
          <div style="width: 140px;">
            <label>Grid radius</label>
            <input id="gridRadius" type="number" min="1" max="200" step="1" value="18" />
          </div>
          <div style="width: 140px;">
            <label>Orientation</label>
            <select id="orientation">
              <option value="pointy" selected>Pointy top</option>
              <option value="flat">Flat top</option>
            </select>
          </div>
          <div class="chiprow" style="align-self:flex-end; padding-bottom: 2px;">
            <span class="chip" id="chipZoom">zoom 100%</span>
            <span class="chip" id="chipCount">tiles 0</span>
            <span class="chip" id="chipSel">sel 0</span>
          </div>
        </div>

        <div class="group">
          <button class="btn tiny primary" id="fit">Fit</button>
          <button class="btn tiny" id="center">Center</button>
          <button class="btn tiny" id="copyBtn">Copy</button>
          <button class="btn tiny" id="pasteBtn">Paste</button>
          <button class="btn tiny" id="undoBtn">Undo</button>
          <button class="btn tiny" id="redoBtn">Redo</button>
          <button class="btn tiny danger" id="clear">Clear map</button>
        </div>
      </div>
    </div>

    <aside class="panel">
      <div class="card" id="versionManagerPanel">
        <div class="title">
          <div>
            <h2>HexGrid Map Editor</h2>
            <div class="sub">Version Manager</div>
          </div>
        </div>

        <div class="kvs">
          <div>Version</div><div class="mono" id="appVersionDisplay">v14.9.12</div>
          <div>License</div><div class="mono">© Copyleft 2026</div>
          <div>Author</div><div>Dillon Lee</div>
          <div>Co-author</div><div>ChatGPT — Model: GPT 5.4 Thinking</div>
        </div>
      </div>

      <div class="card">
        <div class="title">
          <div>
            <h2>Selection</h2>
            <div class="sub">Click/tap to select. Use the Select or Multi-select tools.</div>
          </div>
          <button class="btn tiny danger" id="clearSel">Clear selection</button>
        </div>

        <div class="kvs">
          <div>Selected count</div><div class="mono" id="selCount">0</div>
          <div>Last hex (q,r,s)</div><div class="mono" id="selAxial">—</div>
          <div>Type</div><div class="mono" id="selType">—</div>
          <div>Value / ID</div><div class="mono" id="selValue">—</div>
